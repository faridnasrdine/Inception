secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  credentials:
    file: ../secrets/credentials.txt

networks:
  inception:
    driver: bridge

volumes:
  wordpress_data:
  db_data:

services:

  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb
    image: mariadb
    volumes:
      - /home/nafarid/data/db_data:/var/lib/mysql
    secrets:
      - db_password
      - db_root_password
    env_file: .env
    networks:
      - inception
    restart: unless-stopped

  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress
    image: wordpress
    volumes:
      - /home/nafarid/data/wordpress_data:/var/www/html
    secrets:
      - db_password
      - credentials
    env_file: .env
    networks :
      - inception
    restart: unless-stopped
    depends_on:
      - mariadb
  nginx:
    build: ./requirements/nginx
    container_name: nginx
    image: nginx
    ports:
      - "443:443"
    volumes:
      - /home/nafarid/data/wordpress_data:/var/www/html
    networks:
      - inception
    restart: unless-stopped
    depends_on:
      - wordpress