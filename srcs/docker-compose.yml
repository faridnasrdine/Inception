secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt
  credentials:
    file: ../secrets/credentials.txt

networks:
  inception:
    driver: bridge

volumes:
  wordpress_data:
  db_data:

services:

  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb
    image: mariadb
    volumes:
      - /home/nafarid/data/db_data:/var/lib/mysql
    secrets:
      - db_password
      - db_root_password
    env_file: .env
    networks:
      - inception
    restart: unless-stopped

  wordpress:
    build: ./requirements/wordpress
    container_name: wordpress
    image: wordpress
    volumes:
      - /home/nafarid/data/wordpress_data:/var/www/html
    secrets:
      - db_password
      - db_root_password
      - credentials
    env_file: .env
    networks :
      - inception
    restart: unless-stopped
    depends_on:
      - mariadb
  nginx:
    build: ./requirements/nginx
    container_name: nginx
    image: nginx
    ports:
      - "443:443"
    volumes:
      - /home/nafarid/data/wordpress_data:/var/www/html
    networks:
      - inception
    restart: unless-stopped
    depends_on:
      - wordpress
  redis:
    build: ./requirements/bonus/redis
    container_name: redis
    image: redis
    networks:
      - inception
    restart: unless-stopped
  ftp:
    build: ./requirements/bonus/ftp
    container_name: ftp
    image: ftp
    ports:
      - "21:21"
      - "21000-21010:21000-21010"
    volumes:
      - /home/nafarid/data/wordpress_data:/var/www/html
    secrets:
      - credentials
    networks:
      - inception
    restart: unless-stopped
    depends_on:
      - wordpress
  adminer:
    build: ./requirements/bonus/adminer
    container_name: adminer
    image: adminer
    ports:
      - "8080:8080"
    networks:
      - inception
    restart: unless-stopped
    depends_on:
      - mariadb
  netdata:
    build: ./requirements/bonus/netdata
    container_name: netdata
    image: netdata
    hostname: ${DOMAIN_NAME}
    ports:
      - "19999:19999"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - inception
    restart: unless-stopped
  website:
    build: ./requirements/bonus/website
    container_name: website
    image: website
    ports:
      - "8888:80"
    networks:
      - inception
    restart: unless-stopped