server.document-root = "/var/www/html"
server.port = 80
server.bind = "0.0.0.0"

mimetype.assign = (
    ".html" => "text/html",
    ".css"  => "text/css",
    ".js"   => "application/javascript",
    ".png"  => "image/png",
    ".jpg"  => "image/jpeg",
    ".ico"  => "image/x-icon"
)

index-file.names = ("index.html")
