server.document-root = "/var/www/html"
server.port = 80
server.bind = "0.0.0.0"

mimetype.assign = (
    ".html" => "text/html",
    ".css"  => "text/css",
    ".js"   => "application/javascript",
    ".json" => "application/json",
    ".png"  => "image/png",
    ".jpg"  => "image/jpeg",
    ".svg"  => "image/svg+xml",
    ".ico"  => "image/x-icon",
    ".pdf"  => "application/pdf",
    ".woff"  => "font/woff",
    ".woff2" => "font/woff2"
)

server.error-handler-404 = "/index.html"
index-file.names = ("index.html")
